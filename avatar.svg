<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <rect x="0" y="0" width="256" height="256" fill="#faf6ed"/>
  <rect x="20" y="20" width="216" height="216" fill="none" stroke="#2c2417" stroke-width="4"/>
  <rect x="28" y="28" width="200" height="36" fill="#2c2417"/>
  <text x="128" y="53" text-anchor="middle" font-size="20" fill="#faf6ed" font-weight="bold">jig</text>

  <!-- Calipers frame: a measurement instrument clamping a sample.
       Top jaw + bottom jaw + spine + sample block + measurement ticks. -->

  <!-- Spine (vertical bar of the caliper) -->
  <line x1="60" y1="92" x2="60" y2="208" stroke="#2c2417" stroke-width="3"/>

  <!-- Top jaw -->
  <line x1="60" y1="92" x2="196" y2="92" stroke="#2c2417" stroke-width="3"/>
  <line x1="196" y1="92" x2="196" y2="118" stroke="#2c2417" stroke-width="3"/>

  <!-- Bottom jaw (sliding) -->
  <line x1="60" y1="208" x2="196" y2="208" stroke="#2c2417" stroke-width="3"/>
  <line x1="196" y1="208" x2="196" y2="182" stroke="#2c2417" stroke-width="3"/>

  <!-- Sample being measured: a stack of three transcript bars (the agent shape) -->
  <rect x="100" y="125" width="80" height="14" fill="#2c2417"/>
  <rect x="100" y="143" width="56" height="14" fill="none" stroke="#2c2417" stroke-width="2"/>
  <rect x="100" y="161" width="68" height="14" fill="none" stroke="#2c2417" stroke-width="2"/>

  <!-- Measurement scale: tick marks on the spine -->
  <line x1="56" y1="110" x2="64" y2="110" stroke="#6b5d4f" stroke-width="1.5"/>
  <line x1="56" y1="130" x2="64" y2="130" stroke="#6b5d4f" stroke-width="1.5"/>
  <line x1="56" y1="150" x2="64" y2="150" stroke="#2c2417" stroke-width="2"/>
  <line x1="56" y1="170" x2="64" y2="170" stroke="#6b5d4f" stroke-width="1.5"/>
  <line x1="56" y1="190" x2="64" y2="190" stroke="#6b5d4f" stroke-width="1.5"/>

  <!-- Indicator notch on the sliding jaw, pointing at the sample edge -->
  <polygon points="196,150 188,146 188,154" fill="#2c2417"/>

  <!-- Base rule -->
  <line x1="60" y1="228" x2="196" y2="228" stroke="#c4b99a" stroke-width="2"/>
</svg>
