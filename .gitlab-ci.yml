# gitlab.com/nomograph/jig .gitlab-ci.yml
#
# Pipeline structure provided by nomograph/pipeline tool-rust@v4.1.7.

default:
  tags: [storr]

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/tool-rust@v5.2.1
    inputs:
      binary_name: jig
      project_description: "Agent-shape testing harness: runtime-in-the-loop batteries, LLM-as-judge scoring."
      crates_publish: true
      in_kit_registry: false
  # Fail-closed automerge gate (renovate-architecture L1 verdict
  # contract): osv-verdict -> CHECK_OSV, cargo-verdict -> CHECK_CARGO
  # (builds+tests the crate; jig's tests are offline CLI-surface tests,
  # no API key needed), automerge-gate blocks unless every required
  # check is PRESENT and ==pass. The gate job's green/red is the
  # pipeline status Renovate reads before GitLab native auto-merge.
  - component: gitlab.com/nomograph/pipeline/osv-verdict@v5.3.1
    inputs:
      stage: verdict
  - component: gitlab.com/nomograph/pipeline/cargo-verdict@v5.3.1
    inputs:
      stage: verdict
  - component: gitlab.com/nomograph/pipeline/automerge-gate@v5.3.1
    inputs:
      stage: gate
      required-checks: "osv,cargo"

stages: [lint, test, build, sign, publish, release, notify, verdict, gate]

check-symlinks:
  stage: lint
  image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
  before_script:
    - apk add --no-cache bash git
  script:
    - bash scripts/check-symlinks.sh
